name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check imports
        run: |
          python -c "from src.corpus.synthetic_generator import SyntheticCorpusGenerator"
          python -c "from src.detector.proactive_detector import PROACTIVEDetector"
          python -c "from src.annotation.ai_annotator import AIAnnotator"
          python -c "from src.validation.falsification_tests import FalsificationTestSuite"
          python -c "from src.dashboard.vendor_transparency import VendorTransparencyDashboard"
          python -c "from src.rollout.cross_model_rollout import CrossModelRolloutManager"
